<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>选址分析热力图 - {{ address }}</title>
<style>
body { margin:0; padding:20px; font-family:"Microsoft YaHei"; background:#f5f5f5; }
#map { width:100%; height:600px; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.15); }
.panel { background:#fff; padding:20px; margin-top:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
.panel h2 { margin-top:0; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-top:15px; }
.card { background:#f8f9fa; padding:15px; border-radius:8px; border-left:4px solid #4CAF50; }
.card h3 { margin:0 0 5px; font-size:14px; color:#666; }
.card .val { font-size:28px; font-weight:bold; color:#333; }
.legend { display:flex; gap:20px; margin-top:10px; font-size:13px; color:#666; }
.legend span { display:flex; align-items:center; gap:6px; }
.dot { width:12px; height:12px; border-radius:50%; }
</style>
</head>
<body>

<div class="panel">
  <h2>📍 选址分析报告：{{ address }}</h2>
  <div class="grid">
    <div class="card" style="border-left-color:#e74c3c;">
      <h3>🔴 竞品数量</h3>
      <div class="val">{{ competitor_count }}</div>
    </div>
    <div class="card" style="border-left-color:#3498db;">
      <h3>🔵 周边配套</h3>
      <div class="val">{{ facility_count }}</div>
    </div>
    <div class="card" style="border-left-color:#2ecc71;">
      <h3>🟢 所属区域</h3>
      <div class="val" style="font-size:18px;">{{ district }}</div>
    </div>
    <div class="card" style="border-left-color:#f39c12;">
      <h3>🟡 街道</h3>
      <div class="val" style="font-size:18px;">{{ township }}</div>
    </div>
  </div>
  <div class="legend">
    <span><div class="dot" style="background:#e74c3c;"></div>竞品</span>
    <span><div class="dot" style="background:#3498db;"></div>配套</span>
    <span><div class="dot" style="background:#2ecc71;"></div>目标点</span>
    <span><div class="dot" style="background:rgba(76,175,80,.15);border:1px solid #4CAF50;"></div>搜索范围</span>
  </div>
</div>

<div id="map"></div>

    new AMap.Marker({

    }).setMap(map);
  });

  // 配套
  var facilities = {{ facilities | tojson }};
  facilities.forEach(function(p){
    if(!p.location) return;
    var loc = p.location.split(",");
    new AMap.Marker({
      position:[parseFloat(loc[0]), parseFloat(loc[1])],
      title:p.name,
      // icon:new AMap.Icon({size:new AMap.Size(24,24),image:"https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png"})

    }).setMap(map);
  });

  // 搜索范围
  new AMap.Circle({
    center:center, radius:{{ radius }},
    strokeColor:"#4CAF50", strokeOpacity:.8, strokeWeight:2,
    fillColor:"#4CAF50", fillOpacity:.1
  }).setMap(map);

  // 调试
  console.log("✅ 地图初始化完成，中心：", center);
  console.log("✅ 竞品数：", competitors.length);
  console.log("✅ 配套数：", facilities.length);
})();
</script>

</body>
</html>
